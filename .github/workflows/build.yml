name: Build Drag2Music Installers

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  #  WINDOWS  →  Drag2Music_Setup.exe
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup assets
        run: python build_scripts/setup_assets.py

      - name: Download ffmpeg
        run: python build_scripts/download_ffmpeg.py --platform windows

      - name: PyInstaller
        run: python -m PyInstaller drag2music.spec --clean --noconfirm

      - name: Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/windows/drag2music_setup.iss
          options: /O+

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Drag2Music-Windows
          path: dist/Drag2Music_Setup.exe

  # ─────────────────────────────────────────────
  #  macOS  →  Drag2Music.dmg
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Setup assets
        run: python3 build_scripts/setup_assets.py

      - name: Download ffmpeg
        run: python3 build_scripts/download_ffmpeg.py --platform macos

      - name: PyInstaller
        run: python3 -m PyInstaller drag2music.spec --clean --noconfirm

      - name: Create DMG
        run: |
          chmod +x installer/macos/create_dmg.sh
          bash installer/macos/create_dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Drag2Music-macOS
          path: dist/Drag2Music.dmg

  # ─────────────────────────────────────────────
  #  LINUX  →  AppImage + .deb
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk python3-dev \
            libsdl2-dev libsdl2-mixer-dev \
            fuse libfuse2 dpkg \
            libglib2.0-0 libdbus-1-3

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt

      - name: Setup assets
        run: python3 build_scripts/setup_assets.py

      - name: Download ffmpeg
        run: python3 build_scripts/download_ffmpeg.py --platform linux

      - name: PyInstaller
        run: python3 -m PyInstaller drag2music.spec --clean --noconfirm

      - name: Create AppImage + deb
        run: |
          chmod +x installer/linux/create_appimage.sh
          bash installer/linux/create_appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Drag2Music-Linux-AppImage
          path: Drag2Music-x86_64.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Drag2Music-Linux-deb
          path: drag2music_3.1.0_amd64.deb

  # ─────────────────────────────────────────────
  #  Release  (sadece tag push'unda çalışır)
  # ─────────────────────────────────────────────
  release:
    needs: [ build-windows, build-macos, build-linux ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Drag2Music-Windows/Drag2Music_Setup.exe
            artifacts/Drag2Music-macOS/Drag2Music.dmg
            artifacts/Drag2Music-Linux-AppImage/Drag2Music-x86_64.AppImage
            artifacts/Drag2Music-Linux-deb/drag2music_3.1.0_amd64.deb
          generate_release_notes: true
