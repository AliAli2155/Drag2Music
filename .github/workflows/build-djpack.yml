name: Build DJ Pack

# The DJ Pack is the optional, downloadable add-on that carries the heavy ML
# stack (stem separation + BPM/key). It is versioned and released independently
# of the app, under a 'djpack-v*' tag, so the base installer stays small.

on:
  push:
    tags: [ 'djpack-v*' ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            plat: windows
          - os: macos-latest
            plat: macos
          - os: ubuntu-latest
            plat: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System deps (Linux)
        if: matrix.plat == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install CPU torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install DJ Pack deps
        run: pip install -r dj_pack/requirements.txt

      - name: Build DJ Pack
        run: python dj_pack/build_djpack.py

      - name: Upload DJ Pack
        uses: actions/upload-artifact@v4
        with:
          name: Drag2Music-DJPack-${{ matrix.plat }}
          path: dist/Drag2Music-DJPack-${{ matrix.plat }}.zip

  release:
    needs: [ build ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/djpack-v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish DJ Pack release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/Drag2Music-DJPack-*.zip
          generate_release_notes: true
